services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: db
      POSTGRES_USER: dev
    ports:
      - 5432:5432
    volumes:
      - my-db-volume:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@dev.com
      PGADMIN_DEFAULT_PASSWORD: dev
    ports:
      - 5000:80
    depends_on:
      - db

  ngrok: # expone app. Para probar con el webhook de brevo
    image: ngrok/ngrok:latest
    command:
      - "http"
      - "http://host.docker.internal:8080"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - 4040:4040
    
volumes: 
  my-db-volume: