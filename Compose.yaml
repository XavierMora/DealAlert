services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: db
      POSTGRES_USER: dev
    ports:
      - 5432:5432
    volumes:
      - my-db-volume:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@dev.com
      PGADMIN_DEFAULT_PASSWORD: dev
    ports:
      - 5000:80
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025
    
volumes: 
  my-db-volume: