# db
spring.datasource.url=jdbc:mysql://localhost:3307/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

steam.api.applist.url=https://api.steampowered.com/IStoreService/GetAppList/v1/?key=${STEAM_API_KEY}&max_results=10
#store.steampowered.com
steam.api.appdetails.url=http://localhost:8080/api/appdetails
steam.api.appdetails.delay-between-requests=2s
steam.api.appdetails.games-per-request=2
steam.api.appdetails.max-pages-per-enqueue=3

price.min-interval-update=2m
app.mail=mail@test.com

# indica si inicializar la bd llamando a la applist api de steam
startup.DB=false

#mail
spring.mail.host=localhost
spring.mail.port=1025