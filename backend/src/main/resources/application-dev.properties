steam.applist.api.url=https://api.steampowered.com/IStoreService/GetAppList/v1/?key=${STEAM_API_KEY}&max_results=10

# db
spring.datasource.url=jdbc:mysql://localhost:3307/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# indica si inicializar la bd llamando a la applist api de steam
startup.DB=false