<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de precio</title>
</head>
<body style="font-family: Helvetica, Arial, sans-serif;  margin: 0; padding: 0 0 0 10px;">
    <p style="font-size: 20px; color:#333333; margin: 0; padding: 15px 0; font-weight:bold;">Cambio de precio detectado</p>
            
    <div style="color:#555555; font-size:14px;">
        <p style="padding-bottom: 20px; margin: 0; line-height: 20px;">
            Hola,<br>
            el precio <span th:text></span> del juego <strong th:text="${gameName}"></strong> ha cambiado.
        </p>

        <div th:if="${basePriceChanged}" style="padding-bottom: 20px;">
            <p style="line-height: 20px; margin: 0;">
                El precio base fue modificado<br>
                De
                <span style="font-weight: bold;">
                    $<span th:text="${oldPrice.initialPrice()}"></span> USD
                </span>
                <span style="padding: 0px 5px;">a</span>  
                <span style="font-weight: bold;">
                    $<span style="font-weight: bold;" th:text="${newPrice.initialPrice()}"></span> USD
                </span>
            </p>
        </div>

        <div style="padding-bottom: 10px;">
            <p style="margin: 0; line-height: 20px; padding-bottom: 5px;">
                Precio anterior<br>
                <span th:if="${oldPrice.discount()>0}" style="font-weight: bold; padding-right: 5px;">
                    <span style="text-decoration: line-through; color:#999999;">
                        $<span th:text="${oldPrice.initialPrice()}"></span> USD
                    </span>
                </span>     

                <span style="font-weight: bold;">
                    $<span th:text="${oldPrice.finalPrice()}"></span> USD
                </span>

                <span th:if="${oldPrice.discount()>0}" style="color: #27ae60; padding-left: 2px;">
                    -<span th:text="${oldPrice.discount()}"></span>%
                </span>
            </p>

            <p style="margin: 0; line-height: 20px;">
                Precio actual<br>
                <span th:if="${newPrice.discount()>0 || basePriceChanged}" style="font-weight: bold; padding-right: 5px;">
                    <span style="text-decoration: line-through; color:#999999;">
                        $<span th:text="${newPrice.initialPrice()}"></span> USD
                    </span>
                </span>     

                <span style="font-weight: bold;">
                    $<span th:text="${newPrice.finalPrice()}"></span> USD
                </span>

                <span th:if="${newPrice.discount()>0}" style="color: #27ae60; padding-left: 2px;">
                    -<span th:text="${newPrice.discount()}"></span>%
                </span>
            </p>
        </div>
    </div>

    <div style="padding-top:20px;">
        <a role="link" th:href="${gameSteamUrl}"
            style="
            background-color:#1a76d3;
            color:#ffffff;
            text-decoration:none;
            padding:12px 24px;
            border-radius:4px;
            font-weight:bold;
            display:inline-block;
            cursor: pointer;
            ">
        Ver juego en Steam
        </a>
    </div>
</body>
</html>
