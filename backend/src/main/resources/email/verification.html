<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código de acceso</title>
</head>
<body style="font-family: Helvetica, Arial, sans-serif; margin:0; padding:0 0 0 10px;">
    <p style="font-size: 20px; color:#333333; margin-bottom: 20px; font-weight:bold;">
        Código de acceso
    </p>

    <div style="color:#555555; font-size:14px; line-height:1.5;">
        <p>
            Hola,<br>
            para acceder a tu cuenta, utiliza el siguiente código de acceso:
        </p>

        <div style="margin:0; padding-bottom: 10px 0;">
            <span style="
                display:inline-block;
                background-color:#f0f0f0;
                padding:15px 25px;
                font-size:24px;
                font-weight:bold;
                letter-spacing:4px;
                border-radius:4px;
                color:#444444;
                " th:text="${code}">
            </span>
        </div>

        <p>
            Este código es válido por 10 minutos y puede ser usado una única vez.
        </p>
    </div>

    <!--<div style="margin-top:20px;">
        <a th:href="${loginUrl}"
            style="
                background-color:#ff4800;
                color:#ffffff;
                text-decoration:none;
                padding:12px 24px;
                border-radius:4px;
                font-weight:bold;
                display:inline-block;
                cursor:pointer;
            ">
            Acceder a la cuenta
        </a>
    </div>-->

    <p style="font-size:12px; color:#999999; padding-top:15px; margin: 0;">
        Si no solicitaste este código, podés ignorar este correo.<br>
    </p>
</body>
</html>
