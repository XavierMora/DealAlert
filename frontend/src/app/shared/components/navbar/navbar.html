@let _isAuthenticated = isAuthenticated();

<nav class="w-full h-fit bg-(--surface-2) shadow-md">
    <div class="w-11/12 py-4 h-fit flex sm:flex-row flex-col items-center mx-auto">
        <div class="flex justify-between sm:justify-normal w-full sm:w-fit">
            <h1 (click)="navigateHomePage()" class="text-lg font-bold tracking-wide mr-8 cursor-pointer">
                PriceWatch
            </h1>
    
            <div (click)="toggleMenu()" class="sm:hidden cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e5e5e5"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
            </div>
        </div>
        
        <div [class]="activeMenu() ? 'flex' : 'hidden'" class="h-full sm:flex sm:flex-row flex-col gap-4 sm:items-center self-start items-start mt-4 sm:mt-0 w-full">
            <a routerLink="" routerLinkActive="text-(--main)" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
            <a routerLink="/games" routerLinkActive="text-(--main)" [routerLinkActiveOptions]="{exact: true}">Juegos</a>
            @if(_isAuthenticated){
                <a routerLink="/price-alerts" routerLinkActive="text-(--main)">Mis alertas</a>
            }

            <button (click)="authAction()" class="main-button px-3! sm:ml-auto cursor-pointer">
                <div class="flex items-center gap-0.5">
                @if(_isAuthenticated){
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e5e5e5"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/></svg>
                    <span>Cerrar sesión</span>
                }@else{
                    <svg class="inline" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e5e5e5"><path d="M480-120v-80h280v-560H480v-80h280q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H480Zm-80-160-55-58 102-102H120v-80h327L345-622l55-58 200 200-200 200Z"/></svg>
                    Iniciar sesión
                }
                </div>
            </button>
        </div>
    </div>
</nav>
